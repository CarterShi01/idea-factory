# nginx site for Idea Factory Studio @ studio.enjoyapier.cloud
#
# Replaces the old Hermes Studio (was 127.0.0.1:3001). This panel runs as a
# stdlib Python service on 127.0.0.1:3010 and serves both the built SPA and the
# JSON API from one origin. Reuses the existing enjoyapier.cloud Certbot cert
# (SAN already includes studio.enjoyapier.cloud — no certbot needed).
#
# ⚠️ nginx does NOT authenticate here (the allow.conf gate is password-only).
#    The panel authenticates itself via STUDIO_PASSWORD. Set a STRONG password.
#
# Install (on the VPS, needs sudo — claude-user is not passwordless):
#   sudo cp studio/deploy/studio.enjoyapier.cloud.conf /etc/nginx/sites-available/oc-studio
#   sudo ln -sf /etc/nginx/sites-available/oc-studio /etc/nginx/sites-enabled/oc-studio
#   sudo nginx -t && sudo systemctl reload nginx
# (back up the old one first: sudo cp /etc/nginx/sites-available/oc-studio{,.hermes.bak})

limit_req_zone $binary_remote_addr zone=panel_zone:10m rate=30r/s;

server {
    server_name studio.enjoyapier.cloud;
    client_max_body_size 25M;

    # SSE / websocket-ready proxy headers + long timeouts (LLM runs can take 30s+).
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 3600s;
    proxy_buffering off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        include /etc/nginx/oc-studio-allow.conf;   # existing gate file (password-only by default)
        limit_req zone=panel_zone burst=60 nodelay;
        proxy_pass http://127.0.0.1:3010;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/enjoyapier.cloud/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/enjoyapier.cloud/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = studio.enjoyapier.cloud) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name studio.enjoyapier.cloud;
    return 404;
}
