# reference/sources.yaml — 开源参考源注册表(唯一真相源;CI: tests/test_reference_registry.py)
#
# 每源一条:
#   id         = reference/mirrors/<id>/ 镜像目录名 = miners/<id>.md 沉淀文档名 = provenance 外键
#   repository = 上游仓(github.com/<org>/<repo>)
#   ref        = 镜像钉定的 commit(sync-source.sh --add/刷新时回写;未建镜像时缺省)
#   license    = SPDX 或说明;⚠️ "Other" 必须人工读过 LICENSE 原文才登记
#   lanes      = 产出落哪个模块:八段名 | llm-infra | observability(一源可多 lane)
#   status     = adopt(资产可直接裁剪吸收) | concepts-borrow(只借概念/公式) | watch(定期回看)
#   mirror     = false ⇒ license 禁区(AGPL/NC/RAIL 等):禁止镜像代码,只读文档/公式重新表述
#   mined_for  = d: 数据面(prompt/schema/字段/参数→有门 promote) · m: 机制面(算法/范式→只提案)
#   pin        = true ⇒ 必须钉 commit 消费(反爬对抗/prompt 快迭代/停更自养)
#   note       = 挖什么要点 + 坑;细节以 docs/research/reference-scan/L*.md 为准
#
# skip/reject 负面清单(防重爬)住 docs/research/reference-scan/00-summary.md §3,不在这里。
# 纪律见 reference/README.md;新增源三步:注册一行 → sync-source.sh --add → miners/<id>.md。

sources:
