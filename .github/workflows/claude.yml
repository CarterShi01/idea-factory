name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --max-turns 30
            --allowedTools "Bash(npm install),Bash(npm run build),Bash(npm run test),Bash(npm run lint),Bash(pnpm install),Bash(pnpm build),Bash(pnpm test),Bash(pnpm lint)"

      - name: Create pull request from Claude branch
        if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          echo "Looking for Claude branch for issue #${ISSUE_NUMBER}"
          echo "Default branch: ${DEFAULT_BRANCH}"

          git fetch origin "${DEFAULT_BRANCH}"

          git fetch origin "+refs/heads/claude/issue-${ISSUE_NUMBER}-*:refs/remotes/origin/claude/issue-${ISSUE_NUMBER}-*" || true

          branch="$(git for-each-ref \
            --sort=-committerdate \
            --format='%(refname:short)' \
            "refs/remotes/origin/claude/issue-${ISSUE_NUMBER}-*" \
            | head -n 1 \
            | sed 's#^origin/##')"

          if [[ -z "$branch" ]]; then
            current_branch="$(git branch --show-current || true)"
            if [[ "$current_branch" == claude/issue-${ISSUE_NUMBER}-* ]]; then
              branch="$current_branch"
              echo "Found local Claude branch: ${branch}"
              git push origin "${branch}:${branch}"
              git fetch origin "+refs/heads/${branch}:refs/remotes/origin/${branch}"
            fi
          fi

          if [[ -z "$branch" ]]; then
            echo "No Claude branch found for issue #${ISSUE_NUMBER}. Nothing to PR."
            exit 0
          fi

          echo "Claude branch: ${branch}"

          base_ref="origin/${DEFAULT_BRANCH}"
          head_ref="origin/${branch}"

          if ! git rev-parse --verify "${head_ref}" >/dev/null 2>&1; then
            echo "Remote Claude branch ref not found: ${head_ref}"
            exit 0
          fi

          if git diff --quiet "${base_ref}...${head_ref}"; then
            echo "No changes between ${DEFAULT_BRANCH} and ${branch}. Nothing to PR."
            exit 0
          fi

          existing_pr="$(gh pr list \
            --repo "${REPOSITORY}" \
            --state open \
            --head "${branch}" \
            --json number \
            --jq '.[0].number // empty')"

          if [[ -n "$existing_pr" ]]; then
            echo "PR already exists: #${existing_pr}"
            exit 0
          fi

          echo "Creating PR from ${branch} to ${DEFAULT_BRANCH}"

          gh api "repos/${REPOSITORY}/pulls" \
            -f title="Claude: resolve issue #${ISSUE_NUMBER}" \
            -f head="${branch}" \
            -f base="${DEFAULT_BRANCH}" \
            -f body="This PR was automatically created from Claude Code changes for issue #${ISSUE_NUMBER}.

          Source branch:
          - ${branch}

          Notes:
          - Created by the Claude Code GitHub Action.
          - Please review before merging."
